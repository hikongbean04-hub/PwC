<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Value Diagnosis · PwC</title>
<style>
  :root {
    --orange: #E85D04;
    --orange-dark: #C14800;
    --orange-light: #FFF4EC;
    --orange-border: #FFCBA0;
    --text-primary: #1A1A1A;
    --text-secondary: #5F5E5A;
    --text-muted: #888780;
    --bg: #F7F5F2;
    --white: #FFFFFF;
    --border: #D3D1C7;
    --border-light: #E8E6E1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
  }

  /* 전체 화면을 세로 중앙 정렬 */
  .page-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* 카드 컨테이너 — 넓고 여유롭게 */
  .container {
    width: 100%;
    max-width: 560px;
    background: var(--white);
    border-radius: 20px;
    border: 1px solid var(--border);
    padding: 40px 44px;
  }

  .screen { animation: fadeUp 0.28s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .app-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--orange);
    letter-spacing: 0.06em;
  }

  /* Typography */
  .hero-title {
    font-size: 30px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
    margin-bottom: 12px;
  }
  .hero-sub {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.75;
    margin-bottom: 24px;
  }
  h2 {
    font-size: 21px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 10px;
  }
  p.body-text {
    font-size: 14.5px;
    color: var(--text-secondary);
    line-height: 1.75;
    margin-bottom: 20px;
  }

  /* Lock card */
  .lock-card {
    background: var(--orange-light);
    border: 1px solid var(--orange-border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 24px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .lock-card-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .lock-card p { font-size: 13.5px; color: var(--orange-dark); line-height: 1.65; margin: 0; }
  .lock-card strong { font-weight: 600; display: block; margin-bottom: 3px; font-size: 12.5px; }

  /* Principle cards */
  .principle {
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: 12px;
    padding: 13px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .pnum {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--orange-light);
    color: var(--orange);
    font-size: 12px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .ptext { font-size: 14px; color: var(--text-primary); line-height: 1.55; }

  /* Checkbox */
  .checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    margin: 20px 0;
    transition: border-color 0.2s, background 0.2s;
    background: var(--white);
    user-select: none;
  }
  .checkbox-wrapper.checked { border-color: var(--orange); background: var(--orange-light); }
  .custom-check {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .checkbox-wrapper.checked .custom-check { background: var(--orange); border-color: var(--orange); }
  .check-icon { display: none; }
  .checkbox-wrapper.checked .check-icon { display: block; }
  .checkbox-label { font-size: 14.5px; color: var(--text-primary); }

  /* Buttons */
  .btn {
    display: block;
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    font-size: 15.5px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-primary { background: var(--orange); color: white; }
  .btn-primary:hover { background: var(--orange-dark); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
  .btn-secondary {
    background: var(--white);
    color: var(--text-secondary);
    border: 1px solid var(--border);
    margin-top: 10px;
  }
  .btn-secondary:hover { background: var(--bg); }
  .hint-text { text-align: center; font-size: 12.5px; color: var(--text-muted); margin-top: 12px; }

  /* Progress */
  .progress-wrap { margin-bottom: 24px; }
  .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 13px; font-weight: 600; color: var(--orange); }
  .progress-pct { font-size: 12px; color: var(--text-muted); }
  .progress-track { height: 5px; background: var(--border-light); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--orange); border-radius: 99px; transition: width 0.4s ease; }

  /* Question */
  .q-badge {
    display: inline-block;
    background: var(--orange-light);
    color: var(--orange);
    border: 1px solid var(--orange-border);
    border-radius: 99px;
    padding: 3px 14px;
    font-size: 12.5px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .q-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.6;
    margin-bottom: 18px;
  }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--white);
  }
  .option:hover { border-color: var(--orange-border); background: #FFFAF7; }
  .option.selected { border-color: var(--orange); background: var(--orange-light); }
  .opt-label {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
  }
  .option.selected .opt-label { background: var(--orange); border-color: var(--orange); color: white; }
  .opt-text { font-size: 14.5px; color: var(--text-primary); line-height: 1.55; padding-top: 4px; }

  /* Confirm table */
  .confirm-table {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .confirm-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-light);
  }
  .confirm-row:last-child { border-bottom: none; }
  .confirm-key { font-size: 13.5px; color: var(--text-muted); }
  .confirm-val { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
  .confirm-val.private { color: var(--orange-dark); }

  /* Complete */
  .complete-center { text-align: center; }
  .complete-emoji {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--orange-light);
    border: 2px solid var(--orange-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 34px;
    margin: 0 auto 18px;
  }
  .complete-title { font-size: 26px; font-weight: 700; color: var(--text-primary); margin-bottom: 10px; }
  .complete-sub { font-size: 14.5px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 24px; }
  .private-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--orange-light);
    border: 1.5px solid var(--orange);
    border-radius: 12px;
    padding: 13px 16px;
    margin-bottom: 20px;
  }
  .private-banner span { font-size: 13.5px; color: var(--orange-dark); line-height: 1.5; }

  /* Mission flow */
  .flow-wrap { margin-top: 24px; }
  .flow-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.06em; margin-bottom: 14px; }
  .flow-item { display: flex; align-items: flex-start; gap: 12px; }
  .flow-col { display: flex; flex-direction: column; align-items: center; }
  .flow-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 3px; }
  .flow-dot.gray { background: var(--border); }
  .flow-line { width: 1.5px; height: 22px; background: var(--border-light); }
  .flow-name { font-size: 14px; color: var(--text-primary); padding-bottom: 22px; }
  .flow-name.active { font-weight: 700; color: var(--orange); }
  .flow-name.muted { color: var(--text-muted); }
  .flow-item:last-child .flow-name { padding-bottom: 0; }

  /* Back button */
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 13.5px;
    padding: 0;
    margin-bottom: 24px;
  }
  .back-btn:hover { color: var(--text-primary); }

  @media (max-width: 600px) {
    .container { padding: 28px 24px; border-radius: 0; border-left: none; border-right: none; }
    .page-wrap { padding: 0; align-items: flex-start; }
    .hero-title { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="container" id="app"></div>
</div>

<script>

  let html = '';

  if (state.screen === 1) {

  } else if (state.screen === 2) {

      ${["개인 결과는 본인에게 공개되지 않습니다.",
         "개인 결과는 팀원에게 공개되지 않습니다.",
         "교육팀은 팀 구성 참고 목적으로만 응답 데이터를 활용합니다.",
         "팀 배정 후에는 팀원들과 논의하여 하나의 Main Core Value를 선택합니다."
        ].map((t, i) => `
        <div class="principle">
          <div class="pnum">${i+1}</div>
          <div class="ptext">${t}</div>
        </div>`).join('')}
      <div class="checkbox-wrapper ${state.checked ? 'checked' : ''}" onclick="toggleCheck()">
        <div class="custom-check">
          <svg class="check-icon" width="13" height="13" viewBox="0 0 12 12" fill="none">
            <polyline points="2,6 5,9 10,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="checkbox-label">위 내용을 확인했습니다.</span>
      </div>
      <button class="btn btn-primary" onclick="startQ()" ${!state.checked ? 'disabled' : ''}>질문 시작하기</button>
    </div>`;

  } else if (state.screen === 3) {
    const q = QUESTIONS[state.currentQ];
    const pct = Math.round((state.currentQ / QUESTIONS.length) * 100);
    const isLast = state.currentQ === QUESTIONS.length - 1;
    html = `<div class="screen">
      ${topBar(false)}
      <div class="progress-wrap">
        <div class="progress-meta">
          <span class="progress-label">Question ${state.currentQ + 1} / ${QUESTIONS.length}</span>
          <span class="progress-pct">${pct}% 완료</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="q-badge">Q${state.currentQ + 1}</div>
      <p class="q-text">${q.text}</p>
      ${q.options.map((o, i) => `
        <div class="option ${state.selectedOption === i ? 'selected' : ''}" onclick="pick(${i})">
          <div class="opt-label">${o.label}</div>
          <div class="opt-text">${o.text}</div>
        </div>`).join('')}
      <button class="btn btn-primary" style="margin-top:14px;" onclick="next()" ${state.selectedOption === null ? 'disabled' : ''}>
        ${isLast ? '응답 확인하기' : '다음 질문'}
      </button>
    </div>`;

  } else if (state.screen === 4) {
    html = `<div class="screen">
      ${topBar(true, 'go(3)')}
      <h2>제출 전 확인</h2>
      <p class="body-text">응답을 제출하면 결과는 교육팀의 팀 구성 참고 데이터로 활용됩니다. 개인별 Core Value 결과는 본인과 팀원에게 공개되지 않습니다.</p>
      <div class="confirm-table">
        <div class="confirm-row"><span class="confirm-key">응답 문항 수</span><span class="confirm-val">7개</span></div>
        <div class="confirm-row"><span class="confirm-key">결과 공개 여부</span><span class="confirm-val private">🔒 비공개</span></div>
        <div class="confirm-row"><span class="confirm-key">활용 목적</span><span class="confirm-val">가치 혼합형 팀 구성 참고</span></div>
        <div class="confirm-row"><span class="confirm-key">다음 단계</span><span class="confirm-val">교육팀 팀 구성 후 미션 안내</span></div>
      </div>
      <button class="btn btn-primary" onclick="submit()">제출하기</button>
      <button class="btn btn-secondary" onclick="go(3)">돌아가서 수정하기</button>
    </div>`;

  } else if (state.screen === 5) {
    const flowSteps = ["Core Value Diagnosis","Team Formation","Main Core Value Selection","SCOPE Process","App Prototype","Final Pitch"];
    html = `<div class="screen">
      ${topBar(false)}
      <div class="complete-center">
        <div class="complete-emoji">✅</div>
        <p class="complete-title">Check-in 완료!</p>
        <p class="complete-sub">응답이 정상적으로 제출되었습니다.<br>교육팀은 응답 데이터를 참고하여 다양한 가치 관점이 섞인 팀을 구성할 예정입니다.</p>
      </div>
      <div class="private-banner">
        <span>🔒</span>
        <span>개인별 결과는 본인과 팀원에게 공개되지 않습니다.</span>
      </div>
      <p class="body-text">팀 배정 이후, 팀원들과 함께 하나의 Main Core Value를 선택하고 이를 바탕으로 앱 아이디어를 발전시키게 됩니다.</p>
      <button class="btn btn-primary" onclick="toggleFlow()">미션 안내 확인하기 ${state.showFlow ? '▲' : '▼'}</button>
      ${state.showFlow ? `
      <div class="flow-wrap">
        <div class="flow-label">PREDICT WITH CODE 미션 흐름</div>
        ${flowSteps.map((s, i) => `
          <div class="flow-item">
            <div class="flow-col">
              <div class="flow-dot ${i === 0 ? '' : 'gray'}"></div>
              ${i < flowSteps.length - 1 ? '<div class="flow-line"></div>' : ''}
            </div>
            <span class="flow-name ${i === 0 ? 'active' : 'muted'}">${s}${i === 0 ? ' ✓' : ''}</span>
          </div>`).join('')}
      </div>` : ''}
    </div>`;
  }

  app.innerHTML = html;
}

function go(n) { state.screen = n; render(); window.scrollTo(0,0); }
function toggleCheck() { state.checked = !state.checked; render(); }
function startQ() {
  if (!state.checked) return;
  state.screen = 3; state.currentQ = 0; state.answers = []; state.selectedOption = null;
  render(); window.scrollTo(0,0);
}
function pick(i) { state.selectedOption = i; render(); }
function next() {
  if (state.selectedOption === null) return;
  const q = QUESTIONS[state.currentQ];
  const o = q.options[state.selectedOption];
  state.answers.push({ questionId: q.id, selectedOption: o.label, mappedValue: o.value });
  if (state.currentQ === QUESTIONS.length - 1) { state.screen = 4; state.selectedOption = null; }
  else { state.currentQ++; state.selectedOption = null; }
  render(); window.scrollTo(0,0);
}
function submit() {
  const scores = {"Act with Integrity":0,"Make a Difference":0,"Care":0,"Work Together":0,"Reimagine the Possible":0};
  state.answers.forEach(a => { scores[a.mappedValue]++; });
  console.log("[Core Value Diagnosis] 제출 (관리자 전용):", JSON.stringify({
    participantId: state.participantId, completed: true,
    answers: state.answers, valueScores: scores,
    submittedAt: new Date().toLocaleString('ko-KR')
  }, null, 2));
  state.screen = 5; state.showFlow = false;
  render(); window.scrollTo(0,0);
}
function toggleFlow() { state.showFlow = !state.showFlow; render(); }

render();
</script>
</body>
</html>
